# ==============================================================


  # ── 2. Build y Push imagen Docker ────────────────────────
  build-and-push:
    name: 🐳 Build & Push Docker
    runs-on: ubuntu-latest
    needs: test
    # Solo en push a main (no en PRs)
    if: github.event_name == 'push'
    
    permissions:
      contents: read
      packages: write


    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3


      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}


      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1


      - name: Image digest
        run: echo "✅ Imagen publicada en ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"


  # ── 3. Notificación de deploy (opcional) ─────────────────
  notify:
    name: 📢 Notificar Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to Portainer via Webhook
        if: "${{ secrets.PORTAINER_WEBHOOK_URL }}" != ''
        run: |
          curl -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            --fail || echo "⚠️ Webhook de Portainer no configurado aún"

