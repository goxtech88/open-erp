; ==============================================================
; PHP Configuration - Producción ERP Laravel
; ==============================================================

[PHP]
; Límites de memoria y tiempo
memory_limit = 256M
max_execution_time = 300
max_input_time = 300
max_input_vars = 5000

; Upload (para archivos de facturas/adjuntos)
upload_max_filesize = 50M
post_max_size = 50M

; Errores: en producción no mostrar, solo loguear
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /var/log/php/error.log

; Seguridad
expose_php = Off
allow_url_fopen = On

; Timezone Argentina
date.timezone = America/Argentina/Buenos_Aires

; Extensiones SOAP (necesario para AFIP WebServices)
extension=soap
extension=openssl
