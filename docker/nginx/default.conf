server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    # ── Charset y compresión ──────────────────────────────
    charset utf-8;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # ── Seguridad: ocultar versión ──────────────────────
    server_tokens off;

    # ── Tamaño máximo de upload (facturas, imágenes) ──
    client_max_body_size 50M;

    # ── Rutas Laravel ───────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM ─────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_buffering off;
    }

    # ── Assets estáticos con cache largo ────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Bloquear acceso a archivos sensibles ────────────
    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~ ^/(\.env|\.git|artisan) {
        deny all;
        return 404;
    }

    # ── Logs ─────────────────────────────────────────────
    error_log  /var/log/nginx/erp_error.log;
    access_log /var/log/nginx/erp_access.log;
}
