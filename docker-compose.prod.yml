version: '3.8'

# ==============================================================
# Open.ERP by Goxtech Labs — Stack PRODUCCIÓN para Portainer
# Proxmox CT — usa postgres y redis de stacks externos ya existentes
# ==============================================================
# Variables requeridas en Portainer → Stack → Environment:
#   APP_KEY, DB_PASSWORD, REDIS_PASSWORD, DOMAIN

services:
  # ── Aplicación Laravel (PHP-FPM) ──────────────────────────
  gx_erp_app:
    image: ghcr.io/goxtech88/open-erp:latest
    container_name: gx_erp_app
    restart: always
    working_dir: /var/www/html
    entrypoint: [ "/bin/sh", "docker/entrypoint.sh", "php-fpm" ]
    volumes:
      - gx_erp_storage:/var/www/html/storage
      - gx_erp_bootstrap:/var/www/html/bootstrap/cache
      # Certificados AFIP (montar desde host del Proxmox CT)
      - /opt/goxtech/erp/certs:/var/www/html/storage/afip:ro
    environment:
      APP_NAME: "Open.ERP"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-https://erp.goxtechlabs.com.ar}
      APP_TIMEZONE: America/Argentina/Buenos_Aires
      APP_LOCALE: es
      CACHE_PREFIX: gx_erp

      # ── PostgreSQL ──────────────────────────────────────────
      DB_CONNECTION: pgsql
      DB_HOST: ${DB_HOST:-gx_postgres}
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-gxerp}
      DB_USERNAME: ${DB_USERNAME:-goxtech}
      DB_PASSWORD: ${DB_PASSWORD}

      # ── Redis: Cache + Sesiones + Queue ────────────────────
      # Soluciona queries lentas (1000+ artículos, KPIs de inventario)
      # Cache de stock: 5 min | Valoración inventario: 15 min | Dashboard: 2 min
      REDIS_HOST: ${REDIS_HOST:-gx_redis}
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_CLIENT: phpredis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      SESSION_LIFETIME: 120
      QUEUE_CONNECTION: redis

      # ── Mail ───────────────────────────────────────────────
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_ENCRYPTION: tls
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-erp@goxtechlabs.com.ar}
      MAIL_FROM_NAME: "Open.ERP Goxtech"

      # ── AFIP ───────────────────────────────────────────────
      AFIP_CUIT: ${AFIP_CUIT:-}
      AFIP_MODE: ${AFIP_MODE:-produccion}
    networks:
      - gx_erp_net
      - gx_data_net # red compartida con postgres/redis externos
    healthcheck:
      test: [ "CMD-SHELL", "php-fpm -t || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Nginx (Servidor Web) ──────────────────────────────────
  gx_erp_nginx:
    image: nginx:1.25-alpine
    container_name: gx_erp_nginx
    restart: always
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - gx_erp_storage:/var/www/html/storage:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      # ── Traefik SSL automático (si lo tenés configurado) ───
      - "traefik.enable=true"
      - "traefik.http.routers.gx-erp.rule=Host(`${DOMAIN:-erp.goxtechlabs.com.ar}`)"
      - "traefik.http.routers.gx-erp.entrypoints=websecure"
      - "traefik.http.routers.gx-erp.tls.certresolver=letsencrypt"
      - "traefik.http.services.gx-erp.loadbalancer.server.port=80"
    depends_on:
      - gx_erp_app
    networks:
      - gx_erp_net
      - traefik_public

  # ── Queue Worker (procesa jobs async: emails, reportes) ───
  gx_erp_queue:
    image: ghcr.io/goxtech88/open-erp:latest
    container_name: gx_erp_queue
    restart: always
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    working_dir: /var/www/html
    volumes:
      - gx_erp_storage:/var/www/html/storage
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: ${DB_HOST:-gx_postgres}
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-gxerp}
      DB_USERNAME: ${DB_USERNAME:-goxtech}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST:-gx_redis}
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
    networks:
      - gx_erp_net
      - gx_data_net

# ── Redes ─────────────────────────────────────────────────
networks:
  gx_erp_net:
    driver: bridge
  # Red compartida con los stacks de postgres y redis existentes
  gx_data_net:
    external: true
    name: ${DATA_NETWORK:-postgres_default}
  traefik_public:
    external: true

# ── Volúmenes ─────────────────────────────────────────────
volumes:
  gx_erp_storage:
    driver: local
  gx_erp_bootstrap:
    driver: local
