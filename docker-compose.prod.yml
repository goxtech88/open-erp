version: '3.8'

# ==============================================================
# Open.ERP by Goxtech Labs — Stack PRODUCCIÓN para Portainer
# Redes externas en Proxmox CT:
#   postgres → postgres_goxtech_net (172.27.0.0/16)
#   redis    → redis_default        (172.26.0.0/16)
# ==============================================================

services:
  # ── Aplicación Laravel (PHP-FPM) ──────────────────────────
  gx_erp_app:
    image: ghcr.io/goxtech88/open-erp:latest
    container_name: gx_erp_app
    restart: always
    working_dir: /var/www/html
    volumes:
      - gx_erp_storage:/var/www/html/storage
      - gx_erp_bootstrap:/var/www/html/bootstrap/cache
      - /opt/goxtech/erp/certs:/var/www/html/storage/afip:ro
    environment:
      APP_NAME: "Open.ERP"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-https://erp.goxtechlabs.com.ar}
      APP_TIMEZONE: America/Argentina/Buenos_Aires
      APP_LOCALE: es
      CACHE_PREFIX: gx_erp

      DB_CONNECTION: pgsql
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-gxerp}
      DB_USERNAME: ${DB_USERNAME:-goxtech}
      DB_PASSWORD: ${DB_PASSWORD}

      # Redis cache + sesiones + queue (resuelve queries lentas 1000+ art)
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_CLIENT: phpredis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      SESSION_LIFETIME: 120
      QUEUE_CONNECTION: redis

      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-erp@goxtechlabs.com.ar}
      MAIL_FROM_NAME: "Open.ERP Goxtech"

      AFIP_CUIT: ${AFIP_CUIT:-}
      AFIP_MODE: ${AFIP_MODE:-produccion}
    networks:
      - gx_erp_net
      - postgres_goxtech_net # red real del stack postgres
      - redis_default # red real del stack redis
    healthcheck:
      test: [ "CMD-SHELL", "php-fpm -t || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Nginx (Servidor Web) ──────────────────────────────────
  gx_erp_nginx:
    image: nginx:1.25-alpine
    container_name: gx_erp_nginx
    restart: always
    ports:
      - "${NGINX_PORT:-8081}:80" # 8081 para no chocar con nginx-proxy existente
    volumes:
      - gx_erp_storage:/var/www/html/storage:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - gx_erp_app
    networks:
      - gx_erp_net

  # ── Queue Worker (jobs async via Redis) ───────────────────
  gx_erp_queue:
    image: ghcr.io/goxtech88/open-erp:latest
    container_name: gx_erp_queue
    restart: always
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    working_dir: /var/www/html
    volumes:
      - gx_erp_storage:/var/www/html/storage
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-gxerp}
      DB_USERNAME: ${DB_USERNAME:-goxtech}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
    networks:
      - gx_erp_net
      - postgres_goxtech_net
      - redis_default

# ── Redes ──────────────────────────────────────────────────
networks:
  gx_erp_net:
    driver: bridge
  postgres_goxtech_net:
    external: true # red del stack 'postgres' en Proxmox CT
  redis_default:
    external: true # red del stack 'redis' en Proxmox CT

# ── Volúmenes ──────────────────────────────────────────────
volumes:
  gx_erp_storage:
    driver: local
  gx_erp_bootstrap:
    driver: local
