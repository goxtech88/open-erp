version: '3.8'

# ==============================================================
# ERP Laravel - Stack de PRODUCCIÓN para Portainer
# Sube este archivo como un "Stack" en Portainer.
# Configura las variables de entorno en la UI de Portainer.
# ==============================================================

services:
  # ── Aplicación Laravel (PHP-FPM) ──────────────────────────
  app:
    image: ghcr.io/${GITHUB_USER}/erp-laravel:latest
    # O usa tu Docker Hub: ${DOCKERHUB_USER}/erp-laravel:latest
    container_name: erp_app
    restart: always
    working_dir: /var/www/html
    volumes:
      - erp_storage:/var/www/html/storage
      - erp_bootstrap:/var/www/html/bootstrap/cache
      # Certificados AFIP (montar desde host)
      - /opt/erp/certs:/var/www/html/storage/afip:ro
    environment:
      APP_NAME: ${APP_NAME:-ERP Laravel}
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      APP_TIMEZONE: America/Argentina/Buenos_Aires
      APP_LOCALE: es

      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379

      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: ${APP_NAME:-ERP Laravel}

      AFIP_CUIT: ${AFIP_CUIT:-}
      AFIP_MODE: ${AFIP_MODE:-produccion}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - erp_network
    healthcheck:
      test: [ "CMD", "php-fpm", "-t" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Nginx (Servidor Web) ──────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: erp_nginx
    restart: always
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - erp_storage:/var/www/html/storage:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      # ── Traefik (si lo usás para SSL automático) ──
      - "traefik.enable=true"
      - "traefik.http.routers.erp.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.erp.entrypoints=websecure"
      - "traefik.http.routers.erp.tls.certresolver=letsencrypt"
      - "traefik.http.services.erp.loadbalancer.server.port=80"
    depends_on:
      - app
    networks:
      - erp_network
      - traefik_public # red externa de Traefik

  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: erp_postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp_network

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: erp_redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-secret_redis}
    volumes:
      - redis_data:/data
    networks:
      - erp_network

  # ── Queue Worker (Jobs Laravel) ───────────────────────────
  queue:
    image: ghcr.io/${GITHUB_USER}/erp-laravel:latest
    container_name: erp_queue
    restart: always
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    working_dir: /var/www/html
    volumes:
      - erp_storage:/var/www/html/storage
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
    depends_on:
      - postgres
      - redis
    networks:
      - erp_network

# ── Redes ─────────────────────────────────────────────────
networks:
  erp_network:
    driver: bridge
  traefik_public:
    external: true # red compartida con Traefik

# ── Volúmenes ─────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  erp_storage:
    driver: local
  erp_bootstrap:
    driver: local
