version: '3.8'

# ============================================================
# ERP Laravel - Docker Compose (Desarrollo Local)
# ============================================================

services:
  # ── Aplicación Laravel (PHP-FPM) ──────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: erp_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - erp_network

  # ── Nginx (Servidor Web) ──────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: erp_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - erp_network

  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: erp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-erp_laravel}
      POSTGRES_USER: ${DB_USERNAME:-erp_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-erp_user}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - erp_network

  # ── Redis (Cache y Sesiones) ──────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: erp_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - erp_network

# ── Redes ─────────────────────────────────────────────────
networks:
  erp_network:
    driver: bridge

# ── Volúmenes ─────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
